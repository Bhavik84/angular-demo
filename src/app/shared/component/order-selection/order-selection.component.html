<mat-form-field class="order-selection-box">
  <mat-select
    [value]="activeType"
    placeholder="{{ 'ORDER_SELECTION.LABLE_1' | translate }}"
  >
    @for (option of options; track option) {
      <mat-option [value]="option.value" (click)="changeOrder(option.value)">{{
        option.viewValue | translate
      }}</mat-option>
    }
  </mat-select>
</mat-form-field>
